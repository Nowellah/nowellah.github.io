<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Contact Bridget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #f8f9fa;
      display: flex;
      flex-direction: column;
      min-height: 100vh;

    }

    .container {
      background-color: #030738f3;
      color: white;
      border-radius: 12px;
      padding: 40px;
      margin-top: 60px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
      margin-bottom: 60px;
    }

    main {
      flex: 1;
    }


    .navbar-brand img {
      height: 80px;
      margin-right: 10px;
    }

    nav ul a {
      font-weight: 500;
      font-size: 18px;
    }

    .logo-img {
      height: 200px;
      width: auto;
    }

    .contact-form {
      background-color:#030738f3;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    .contact-form h2 {
      color: white;
      font-size: 2rem;
    }

    .btn-primary {
      background-color: white;
      color: #030738f3;
      border: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #0dcaf0;
      color: #fff;
    }


    footer {
      background-color: #030738f3;
      color: white;
    }

    footer a:hover i {
      color: #0dcaf0;
      transform: scale(1.2);
      transition: all 0.3s ease;
    }
  </style>
</head>

<body>
  <!-- Navbar with Logo -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="images/LOGO.png" alt="Logo" class="logo-img me-2" />
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-dark fs-5 fw-bold" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark fs-5 fw-bold" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark fw-bold fs-5" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark fw-bold fs-5" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container py-5">
      <div class="contact-form">
        <h2 class="mb-4 fw-bold text-center">Let's Connect</h2>
        <form action="#" onsubmit="event.preventDefault(); alert('Thank you for contacting Bridget!');">
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="name" placeholder="Jane Doe" />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Your Email</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Your Message</label>
            <textarea class="form-control" id="message" rows="4" placeholder="Let's collaborate!"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-3">
    <p class="mb-2">
      © <span id="year"></span> Bridget. All rights reserved.
    </p>
    <div>
      <a href="https://linkedin.com/in/nowellahwalker" target="_blank" class="mx-2 text-white" title="LinkedIn">
        <i class="fab fa-linkedin fa-lg"></i>
      </a>
      <a href="https://github.com/nowellah" target="_blank" class="mx-2 text-white" title="GitHub">
        <i class="fab fa-github fa-lg"></i>
      </a>
      <a href="mailto:abridgetnowellah@gmail.com" class="mx-2 text-white" title="Email">
        <i class="fas fa-envelope fa-lg"></i>
      </a>
    </div>
    <p class="text-white">Follow me on social media for updates!</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
